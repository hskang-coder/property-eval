<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물건 경쟁력 평가폼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a18;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:2rem 1rem}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;color:#1a1a18}
.section{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.sec-title{font-size:13px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.row{display:grid;grid-template-columns:1fr;gap:6px;margin-bottom:.75rem}
.row label{font-size:14px;color:#1a1a18;font-weight:500}
.radio-group{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.radio-group.three{grid-template-columns:repeat(3,1fr)}
.radio-group.five{grid-template-columns:repeat(5,1fr)}
.opt{position:relative}
.opt input{position:absolute;opacity:0;width:0;height:0}
.opt label{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;cursor:pointer;font-size:11px;color:#666;text-align:center;gap:3px;min-height:52px;transition:background .15s,border-color .15s}
.opt label .score{font-size:12px;font-weight:500;color:#999}
.opt input:checked + label{border-color:#378ADD;background:#E6F1FB;color:#0C447C}
.opt input:checked + label .score{color:#0C447C}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.meta input,.meta select{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;background:#fff;color:#1a1a18;font-family:inherit}
.meta label{font-size:13px;color:#666;margin-bottom:4px;display:block}
.result-box{border-radius:12px;padding:1.5rem;margin-top:1rem;border:0.5px solid rgba(0,0,0,0.1);background:#f9f9f7}
.result-header{display:flex;align-items:baseline;gap:12px;margin-bottom:1rem}
.result-score{font-size:40px;font-weight:500;color:#1a1a18}
.result-grade{font-size:15px;font-weight:500;padding:4px 14px;border-radius:20px}
.result-bars{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:12px;color:#666;width:80px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-val{font-size:12px;font-weight:500;color:#666;width:36px;text-align:right;flex-shrink:0}
.btn-calc{width:100%;padding:12px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem;transition:opacity .15s;font-family:inherit}
.btn-calc:hover{opacity:.85}
.guide{font-size:12px;color:#999;margin-top:4px}
.warn-box{margin-top:1rem;padding:10px 12px;border-radius:8px;font-size:13px;display:none;background:#FFEBEE;color:#B71C1C}
.btn-reset{margin-top:.75rem;width:100%;padding:10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;color:#1a1a18;font-size:14px;cursor:pointer;font-family:inherit}
.btn-reset:hover{background:rgba(0,0,0,0.04)}
.btn-save{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem;transition:opacity .15s;font-family:inherit}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.45;cursor:not-allowed}
.save-status{margin-top:.5rem;font-size:13px;text-align:center;min-height:20px}
.save-ok{color:#1B5E20}.save-err{color:#B71C1C}
@media(max-width:500px){
  .radio-group{grid-template-columns:repeat(2,1fr)}
  .radio-group.three{grid-template-columns:repeat(3,1fr)}
  .radio-group.five{grid-template-columns:repeat(3,1fr)}
  .meta{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
<h1>물건 경쟁력 평가</h1>

<div class="section">
  <div class="sec-title">기본 정보</div>
  <div class="meta">
    <div><label>주소</label><input type="text" id="building" placeholder="예) 서울 관악구 신림로66길 27-3"></div>
    <div><label>호실</label><input type="text" id="room" placeholder="예) 304호"></div>
    <div><label>담당자</label><input type="text" id="manager" placeholder="이름"></div>
    <div><label>방문일</label><input type="date" id="visit_date"></div>
  </div>
</div>

<div class="section">
  <div class="sec-title">1 · 주변환경 <span class="guide">5개 항목 · 최대 20점</span></div>
  <div class="row">
    <label>역 거리</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="env1" value="4" id="e1a"><label for="e1a">도보 5분 이내<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="env1" value="3" id="e1b"><label for="e1b">10분 이내<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="env1" value="2" id="e1c"><label for="e1c">15분 이내<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="env1" value="1" id="e1d"><label for="e1d">15분 초과<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>언덕 여부</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="env2" value="4" id="e2a"><label for="e2a">평지<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="env2" value="3" id="e2b"><label for="e2b">약간 경사<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="env2" value="2" id="e2c"><label for="e2c">체감 경사<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="env2" value="1" id="e2d"><label for="e2d">심한 언덕<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>주변 안전감</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="env3" value="4" id="e3a"><label for="e3a">밝고 상권형성<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="env3" value="3" id="e3b"><label for="e3b">보통 주택가<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="env3" value="2" id="e3c"><label for="e3c">다소 어두움<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="env3" value="1" id="e3d"><label for="e3d">우범 우려<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>경쟁물건 밀집도</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="env4" value="4" id="e4a"><label for="e4a">희소<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="env4" value="3" id="e4b"><label for="e4b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="env4" value="2" id="e4c"><label for="e4c">많음<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="env4" value="1" id="e4d"><label for="e4d">과밀<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>고시원 느낌</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="env5" value="4" id="e5a"><label for="e5a">없음<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="env5" value="3" id="e5b"><label for="e5b">일부<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="env5" value="2" id="e5c"><label for="e5c">다수<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="env5" value="1" id="e5d"><label for="e5d">집중지역<span class="score">1점</span></label></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-title">2 · 건물 외부환경 <span class="guide">4개 항목 · 최대 16점</span></div>
  <div class="row">
    <label>외관 상태</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="ext1" value="4" id="x1a"><label for="x1a">신축/관리우수<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="ext1" value="3" id="x1b"><label for="x1b">양호<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="ext1" value="2" id="x1c"><label for="x1c">노후<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="ext1" value="1" id="x1d"><label for="x1d">심각한 노후<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>낙서/오염</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="ext2" value="4" id="x2a"><label for="x2a">없음<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="ext2" value="3" id="x2b"><label for="x2b">경미<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="ext2" value="2" id="x2c"><label for="x2c">다수<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="ext2" value="1" id="x2d"><label for="x2d">심각<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>우편함/공용부</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="ext3" value="4" id="x3a"><label for="x3a">정돈<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="ext3" value="3" id="x3b"><label for="x3b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="ext3" value="2" id="x3c"><label for="x3c">혼잡<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="ext3" value="1" id="x3d"><label for="x3d">방치<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>건물 입구 안전성</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="ext4" value="4" id="x4a"><label for="x4a">매우 안전<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="ext4" value="3" id="x4b"><label for="x4b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="ext4" value="2" id="x4c"><label for="x4c">불안<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="ext4" value="1" id="x4d"><label for="x4d">위험<span class="score">1점</span></label></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-title">3 · 건물 내부환경 <span class="guide">4개 항목 · 최대 16점</span></div>
  <div class="row">
    <label>보안 시설</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="int1" value="4" id="i1a"><label for="i1a">자동문+CCTV<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="int1" value="3" id="i1b"><label for="i1b">도어락<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="int1" value="2" id="i1c"><label for="i1c">일부<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="int1" value="1" id="i1d"><label for="i1d">없음<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>복도/계단 상태</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="int2" value="4" id="i2a"><label for="i2a">매우 정돈<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="int2" value="3" id="i2b"><label for="i2b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="int2" value="2" id="i2c"><label for="i2c">어수선<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="int2" value="1" id="i2d"><label for="i2d">방치<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>관리 상태</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="int3" value="4" id="i3a"><label for="i3a">정돈<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="int3" value="3" id="i3b"><label for="i3b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="int3" value="2" id="i3c"><label for="i3c">혼잡<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="int3" value="1" id="i3d"><label for="i3d">방치<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>엘리베이터</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="int4" value="4" id="i4a"><label for="i4a">매우 정돈<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="int4" value="3" id="i4b"><label for="i4b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="int4" value="2" id="i4c"><label for="i4c">혼잡·어수선<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="int4" value="1" id="i4d"><label for="i4d">방치<span class="score">1점</span></label></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-title">4 · 방 내부환경 <span class="guide">6개 항목 · 최대 24점</span></div>
  <div class="row">
    <label>방 크기</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rm1" value="4" id="r1a"><label for="r1a">아주 큼<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rm1" value="3" id="r1b"><label for="r1b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="rm1" value="2" id="r1c"><label for="r1c">작음<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="rm1" value="1" id="r1d"><label for="r1d">매우 작음<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>채광 상태</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rm2" value="4" id="r2a"><label for="r2a">밝음<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rm2" value="3" id="r2b"><label for="r2b">보통<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="rm2" value="2" id="r2c"><label for="r2c">다소 어두움<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="rm2" value="1" id="r2d"><label for="r2d">어둡고 곰팡이<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>도배/장판</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rm3" value="4" id="r3a"><label for="r3a">신품급<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rm3" value="3" id="r3b"><label for="r3b">양호<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="rm3" value="2" id="r3c"><label for="r3c">마모<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="rm3" value="1" id="r3d"><label for="r3d">훼손<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>화장실</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rm4" value="4" id="r4a"><label for="r4a">리모델링급<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rm4" value="3" id="r4b"><label for="r4b">양호<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="rm4" value="2" id="r4c"><label for="r4c">노후<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="rm4" value="1" id="r4d"><label for="r4d">심각<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>주방·가구</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rm5" value="4" id="r5a"><label for="r5a">신형<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rm5" value="3" id="r5b"><label for="r5b">정상<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="rm5" value="2" id="r5c"><label for="r5c">노후<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="rm5" value="1" id="r5d"><label for="r5d">불량<span class="score">1점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>가전</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rm6" value="4" id="r6a"><label for="r6a">신형<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rm6" value="3" id="r6b"><label for="r6b">정상<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="rm6" value="2" id="r6c"><label for="r6c">노후<span class="score">2점</span></label></div>
      <div class="opt"><input type="radio" name="rm6" value="1" id="r6d"><label for="r6d">불량<span class="score">1점</span></label></div>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-title">5 · 보정값</div>
  <div class="row">
    <label>중도퇴실 반복 (물건 하자 기인)</label>
    <div class="radio-group">
      <div class="opt"><input type="radio" name="rep" value="10" id="p1a"><label for="p1a">0회<span class="score">10점</span></label></div>
      <div class="opt"><input type="radio" name="rep" value="7" id="p1b"><label for="p1b">1회<span class="score">7점</span></label></div>
      <div class="opt"><input type="radio" name="rep" value="4" id="p1c"><label for="p1c">2회<span class="score">4점</span></label></div>
      <div class="opt"><input type="radio" name="rep" value="0" id="p1d"><label for="p1d">3회 이상<span class="score">0점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>주변 시세 대비</label>
    <div class="radio-group five">
      <div class="opt"><input type="radio" name="mkt" value="15" id="m1a"><label for="m1a">-10만원<span class="score">15점</span></label></div>
      <div class="opt"><input type="radio" name="mkt" value="11" id="m1b"><label for="m1b">-5만원<span class="score">11점</span></label></div>
      <div class="opt"><input type="radio" name="mkt" value="7" id="m1c"><label for="m1c">보통<span class="score">7점</span></label></div>
      <div class="opt"><input type="radio" name="mkt" value="3" id="m1d"><label for="m1d">+5만원<span class="score">3점</span></label></div>
      <div class="opt"><input type="radio" name="mkt" value="0" id="m1e"><label for="m1e">+10만원<span class="score">0점</span></label></div>
    </div>
  </div>
  <div class="row">
    <label>층수</label>
    <div class="radio-group three">
      <div class="opt"><input type="radio" name="flr" value="10" id="f1a"><label for="f1a">2층 이상<span class="score">10점</span></label></div>
      <div class="opt"><input type="radio" name="flr" value="5" id="f1b"><label for="f1b">1층<span class="score">5점</span></label></div>
      <div class="opt"><input type="radio" name="flr" value="0" id="f1c"><label for="f1c">반지하<span class="score">0점</span></label></div>
    </div>
  </div>
</div>

<button class="btn-calc" onclick="calc()">점수 계산하기</button>

<div class="result-box" id="result-box" style="display:none">
  <div class="result-header">
    <span class="result-score" id="total-score">0</span>
    <span class="result-grade" id="grade-badge">-</span>
  </div>
  <div class="result-bars" id="bars"></div>
  <div class="warn-box" id="warn-box"></div>
  <button class="btn-save" id="btn-save" onclick="saveToSheet()">구글 시트에 저장하기</button>
  <div class="save-status" id="save-status"></div>
  <button class="btn-reset" onclick="resetForm()">새로 입력하기</button>
</div>

</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyIVAUOPruTpdxFSyDcRt7NUv9XVL3Q6TEsVctIh6p9V-RtQOsx12KpfMCk_bQKJDZRdw/exec';

let lastResult=null;

function getVal(name){
  const el=document.querySelector('input[name="'+name+'"]:checked');
  return el?parseFloat(el.value):null;
}
function getLabel(name){
  const el=document.querySelector('input[name="'+name+'"]:checked');
  if(!el)return '';
  return el.closest('.opt').querySelector('label').childNodes[0].textContent.trim();
}

function calc(){
  const env=[getVal('env1'),getVal('env2'),getVal('env3'),getVal('env4'),getVal('env5')];
  const ext=[getVal('ext1'),getVal('ext2'),getVal('ext3'),getVal('ext4')];
  const int_=[getVal('int1'),getVal('int2'),getVal('int3'),getVal('int4')];
  const rm=[getVal('rm1'),getVal('rm2'),getVal('rm3'),getVal('rm4'),getVal('rm5'),getVal('rm6')];
  const rep=getVal('rep');
  const mkt=getVal('mkt');
  const flr=getVal('flr');
  const missing=[];
  if(env.some(v=>v===null))missing.push('주변환경');
  if(ext.some(v=>v===null))missing.push('건물 외부환경');
  if(int_.some(v=>v===null))missing.push('건물 내부환경');
  if(rm.some(v=>v===null))missing.push('방 내부환경');
  if(rep===null)missing.push('중도퇴실 반복');
  if(mkt===null)missing.push('주변 시세');
  if(flr===null)missing.push('층수');
  if(missing.length>0){alert('미입력 항목: '+missing.join(', '));return;}

  const sEnv=env.reduce((a,b)=>a+b,0);
  const sExt=ext.reduce((a,b)=>a+b,0);
  const sInt=int_.reduce((a,b)=>a+b,0);
  const sRm=rm.reduce((a,b)=>a+b,0);
  const cEnv=Math.round((sEnv/20)*20*10)/10;
  const cExt=Math.round((sExt/16)*10*10)/10;
  const cInt=Math.round((sInt/16)*10*10)/10;
  const cRm=Math.round((sRm/24)*25*10)/10;
  const cRep=Math.round((rep/10)*10*10)/10;
  const cMkt=Math.round((mkt/15)*15*10)/10;
  const cFlr=Math.round((flr/10)*10*10)/10;
  const total=Math.round((cEnv+cExt+cInt+cRm+cRep+cMkt+cFlr)*10)/10;

  let grade,bg,fg;
  if(total>=90){grade='최상급';bg='#E3F2FD';fg='#0D47A1';}
  else if(total>=80){grade='상급';bg='#E8F5E9';fg='#1B5E20';}
  else if(total>=70){grade='일반급';bg='#FFFDE7';fg='#F57F17';}
  else if(total>=60){grade='하급';bg='#FFF3E0';fg='#E65100';}
  else{grade='최하급';bg='#FFEBEE';fg='#B71C1C';}

  document.getElementById('total-score').textContent=total.toFixed(1);
  const gb=document.getElementById('grade-badge');
  gb.textContent=grade; gb.style.background=bg; gb.style.color=fg;

  const barsData=[
    {label:'주변환경',val:cEnv,max:20,color:'#378ADD'},
    {label:'건물 외부',val:cExt,max:10,color:'#1D9E75'},
    {label:'건물 내부',val:cInt,max:10,color:'#1D9E75'},
    {label:'방 내부',val:cRm,max:25,color:'#534AB7'},
    {label:'퇴실 반복',val:cRep,max:10,color:'#888780'},
    {label:'주변 시세',val:cMkt,max:15,color:'#BA7517'},
    {label:'층수',val:cFlr,max:10,color:'#888780'},
  ];
  document.getElementById('bars').innerHTML=barsData.map(b=>`
    <div class="bar-row">
      <span class="bar-label">${b.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(b.val/b.max*100)}%;background:${b.color}"></div></div>
      <span class="bar-val">${b.val.toFixed(1)}/${b.max}</span>
    </div>`).join('');

  const warnEl=document.getElementById('warn-box');
  const warns=[];
  if(flr===0)warns.push('⚠ 반지하 물건 — 계약 신중 검토 필요');
  if(rep===0)warns.push('⚠ 퇴실 3회 이상 — 계약중지 물건 검토 대상');
  if(total<60)warns.push('⚠ 최하급 물건 — 즉시 개선 또는 계약 제한 검토');
  if(warns.length>0){warnEl.style.display='block';warnEl.innerHTML=warns.join('<br>');}
  else{warnEl.style.display='none';}

  // 저장용 데이터 보관
  lastResult={
    제출시각: new Date().toLocaleString('ko-KR'),
    주소: document.getElementById('building').value,
    호실: document.getElementById('room').value,
    담당자: document.getElementById('manager').value,
    방문일: document.getElementById('visit_date').value,
    // 주변환경 선택값
    역거리: getLabel('env1'), 언덕여부: getLabel('env2'), 주변안전감: getLabel('env3'),
    경쟁밀집도: getLabel('env4'), 고시원느낌: getLabel('env5'),
    // 건물외부
    외관상태: getLabel('ext1'), 낙서오염: getLabel('ext2'),
    우편함공용부: getLabel('ext3'), 입구안전성: getLabel('ext4'),
    // 건물내부
    보안시설: getLabel('int1'), 복도계단: getLabel('int2'),
    관리상태: getLabel('int3'), 엘리베이터: getLabel('int4'),
    // 방내부
    방크기: getLabel('rm1'), 채광: getLabel('rm2'), 도배장판: getLabel('rm3'),
    화장실: getLabel('rm4'), 주방가구: getLabel('rm5'), 가전: getLabel('rm6'),
    // 보정값
    중도퇴실반복: getLabel('rep'), 주변시세: getLabel('mkt'), 층수: getLabel('flr'),
    // 환산점수
    주변환경점수: cEnv, 건물외부점수: cExt, 건물내부점수: cInt,
    방내부점수: cRm, 퇴실반복점수: cRep, 시세점수: cMkt, 층수점수: cFlr,
    총점: total, 등급: grade,
    경보: warns.join(' / ')
  };

  document.getElementById('save-status').textContent='';
  document.getElementById('result-box').style.display='block';
  document.getElementById('result-box').scrollIntoView({behavior:'smooth',block:'start'});
}

function saveToSheet(){
  if(!lastResult){alert('먼저 점수를 계산해 주세요.');return;}
  const btn=document.getElementById('btn-save');
  const status=document.getElementById('save-status');
  btn.disabled=true;
  btn.textContent='저장 중...';
  status.textContent='';
  fetch(SCRIPT_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(lastResult)
  })
  .then(()=>{
    status.innerHTML='<span class="save-ok">✓ 구글 시트에 저장됐습니다.</span>';
    btn.textContent='저장 완료';
  })
  .catch(()=>{
    status.innerHTML='<span class="save-err">저장 실패 — 잠시 후 다시 시도해 주세요.</span>';
    btn.disabled=false;
    btn.textContent='구글 시트에 저장하기';
  });
}

function resetForm(){
  document.querySelectorAll('input[type=radio]').forEach(r=>r.checked=false);
  document.querySelectorAll('input[type=text], input[type=date]').forEach(i=>i.value='');
  document.getElementById('result-box').style.display='none';
  document.getElementById('btn-save').disabled=false;
  document.getElementById('btn-save').textContent='구글 시트에 저장하기';
  lastResult=null;
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
